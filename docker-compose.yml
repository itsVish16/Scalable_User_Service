version: '3.8'

services:
  api:
    build: .
    container_name: user_service_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    command: ["/app/docker/start.sh"]

  celery_worker:
    build: .
    container_name: user_service_worker
    env_file:
      - .env
    restart: unless-stopped
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=info"]
