#cloud-config
package_update: true
package_upgrade: false

write_files:
  - path: /app-setup.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      
      echo "=== Starting LoadGen Setup ==="
      
      # 1. Install dependencies
      apt-get update
      apt-get install -y git curl python3 python3-pip python3-venv
      
      # 2. Install uv for ubuntu user
      sudo -u ubuntu -i sh -c "curl -LsSf https://astral.sh/uv/install.sh | sh"
      
      # 3. Clone repository
      git clone https://github.com/itsVish16/Scalable_User_Service.git /app
      chown -R ubuntu:ubuntu /app
      
      # 4. Sync python dependencies including locust as ubuntu user
      sudo -u ubuntu -i sh -c "cd /app && /home/ubuntu/.local/bin/uv sync"
      
      echo "=== LoadGen Setup Complete ==="

runcmd:
  - bash /app-setup.sh
