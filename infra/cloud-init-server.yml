#cloud-config
package_update: true
package_upgrade: false

write_files:
  - path: /app-setup.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      
      echo "=== Starting Server Setup ==="
      
      # 1. Install Git and dependencies
      apt-get update
      apt-get install -y git curl
      
      # 2. Install Docker
      curl -fsSL https://get.docker.com | sh
      
      # 3. Clone repository
      git clone https://github.com/itsVish16/Scalable_User_Service.git /app
      cd /app
      
      # 4. Create .env file for docker compose
      cat << 'EOF' > .env
      DEBUG=false
      DATABASE_URL=postgresql+asyncpg://userservice:userservice@postgres:5432/userservice
      REDIS_URL=redis://redis:6379/0
      SECRET_KEY=prod-secret-key-placeholder-32-chars-long-minimum-randomness-xyz
      ALGORITHM=HS256
      JWT_ISSUER=scalable-user-service
      ACCESS_TOKEN_EXPIRE_MINUTES=30
      REFRESH_TOKEN_EXPIRE_MINUTES=10080
      DB_POOL_SIZE=40
      DB_MAX_OVERFLOW=40
      DB_POOL_TIMEOUT=30
      REDIS_MAX_CONNECTIONS=500
      ENABLE_RATE_LIMITING=false
      CELERY_BROKER_URL=redis://redis:6379/0
      CELERY_RESULT_BACKEND=redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER=false
      EMAIL_DELIVERY_ENABLED=false
      EMAIL_FROM=noreply@example.com
      CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://localhost:8089
      LOAD_TEST_USER_COUNT=5000
      EOF
      
      # 5. Build and run services
      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
      
      # 6. Wait for API to be healthy
      echo "Waiting for API service to be healthy..."
      for i in {1..30}; do
        if docker compose exec -T api curl -f http://localhost:8000/health/live >/dev/null 2>&1; then
          echo "API is healthy!"
          break
        fi
        sleep 5
      done
      
      # 7. Seed 5000 users
      echo "Copying seeding script to container..."
      docker compose cp setup_test_data.py api:/app/setup_test_data.py
      echo "Seeding load test users..."
      docker compose exec -u root -T api python setup_test_data.py
      
      # 8. Copy credentials json out of container
      docker compose cp api:/app/.loadtest_users.json /app/.loadtest_users.json
      chown -R ubuntu:ubuntu /app
      
      echo "=== Server Setup Complete ==="

runcmd:
  - bash /app-setup.sh
